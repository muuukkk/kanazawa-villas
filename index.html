<head>

<title>Kanazawa Villas — 金沢ヴィラズ</title>

<style>
/* 金沢ヴィラズ — 共通スタイル */

:root {
  --ink: #1a1815;
  --ink-soft: #2a2722;
  --paper: #f4f1ea;
  --paper-warm: #ebe5d9;
  --paper-deep: #d9d2c2;
  --line: rgba(26, 24, 21, 0.14);
  --line-strong: rgba(26, 24, 21, 0.28);
  --muted: #7a756c;
  --muted-soft: #a39e92;
  --accent: #7a5c3a;
  --accent-deep: #5a3f22;
  --accent-cool: #3a4a52;
  --highlight: #c2a878;

  --f-display: "Cormorant Garamond", "Shippori Mincho", serif;
  --f-jp-display: "Shippori Mincho", "Noto Serif JP", serif;
  --f-body: "Inter", "Noto Sans JP", system-ui, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, monospace;

  --page-x: clamp(20px, 4vw, 64px);
  --section-y: clamp(80px, 10vw, 160px);
}

html[data-theme="sumi"] { --ink:#1a1815; --paper:#f4f1ea; --paper-warm:#ebe5d9; --paper-deep:#d9d2c2; --accent:#7a5c3a; --accent-cool:#3a4a52; --highlight:#c2a878; }
html[data-theme="ai"] { --ink:#14202a; --ink-soft:#1f2e3a; --paper:#eef1f2; --paper-warm:#dfe5e7; --paper-deep:#c8d1d4; --line:rgba(20,32,42,0.14); --line-strong:rgba(20,32,42,0.30); --muted:#5e6e78; --muted-soft:#8c9aa3; --accent:#2f4a5c; --accent-cool:#1a3240; --highlight:#8aa5b3; }
html[data-theme="tsuchi"] { --ink:#2a1f18; --ink-soft:#3a2d24; --paper:#f1e9dc; --paper-warm:#e3d6c0; --paper-deep:#c9b89a; --line:rgba(42,31,24,0.14); --line-strong:rgba(42,31,24,0.30); --muted:#7a6850; --muted-soft:#a89680; --accent:#8a5a2c; --accent-cool:#6a4a2a; --highlight:#c9a572; }
html[data-theme="koke"] { --ink:#1a1f17; --ink-soft:#262c22; --paper:#eceee4; --paper-warm:#dde0d2; --paper-deep:#c1c6b2; --line:rgba(26,31,23,0.14); --line-strong:rgba(26,31,23,0.30); --muted:#676c5c; --muted-soft:#969b87; --accent:#4a5a32; --accent-cool:#364224; --highlight:#9cae78; }

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--paper); color: var(--ink); font-family: var(--f-body); font-feature-settings: "palt"; font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; background: none; border: none; color: inherit; padding: 0; }
h1, h2, h3, h4 { margin: 0; font-weight: 400; letter-spacing: 0.01em; }
p { margin: 0; }

html[data-heading="mincho"] .display { font-family: var(--f-jp-display); }
html[data-heading="serif"] .display { font-family: var(--f-display); }

.display { font-family: var(--f-display); font-weight: 300; letter-spacing: -0.01em; line-height: 1.05; }
.jp-display { font-family: var(--f-jp-display); font-weight: 400; letter-spacing: 0.08em; }
.eyebrow { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }

.site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 18px var(--page-x); display: flex; align-items: center; justify-content: space-between; background: color-mix(in oklab, var(--paper) 88%, transparent); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
.site-header .brand { display: flex; align-items: baseline; gap: 10px; }
.site-header .brand-mark { font-family: var(--f-jp-display); font-size: 18px; letter-spacing: 0.18em; }
.site-header .brand-sub { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.24em; color: var(--muted); text-transform: uppercase; }
.site-nav { display: flex; gap: 28px; align-items: center; }
.site-nav a { font-size: 12px; letter-spacing: 0.12em; color: var(--ink); opacity: 0.75; transition: opacity 0.2s; }
.site-nav a:hover { opacity: 1; }
.lang-switch { display: flex; gap: 2px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; border: 1px solid var(--line-strong); border-radius: 999px; padding: 3px; }
.lang-switch button { padding: 4px 10px; border-radius: 999px; opacity: 0.55; transition: all 0.2s; }
.lang-switch button.active { background: var(--ink); color: var(--paper); opacity: 1; }

.btn-book { display: inline-flex; align-items: center; gap: 10px; padding: 11px 20px 11px 22px; background: var(--ink); color: var(--paper); border-radius: 999px; font-size: 12px; letter-spacing: 0.14em; transition: transform 0.2s, background 0.2s; }
.btn-book:hover { background: var(--accent-deep, var(--ink-soft)); transform: translateY(-1px); }
.btn-book .arrow { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; }
.btn-book .arrow svg { width: 100%; height: 100%; }

.btn-ghost { display: inline-flex; align-items: center; gap: 10px; padding: 11px 22px; border: 1px solid var(--ink); border-radius: 999px; font-size: 12px; letter-spacing: 0.14em; color: var(--ink); transition: all 0.2s; }
.btn-ghost:hover { background: var(--ink); color: var(--paper); }

.ph { position: relative; background: repeating-linear-gradient(45deg, color-mix(in oklab, var(--paper-deep) 80%, transparent) 0 12px, color-mix(in oklab, var(--paper-warm) 80%, transparent) 12px 24px), var(--paper-warm); overflow: hidden; }
.ph::after { content: attr(data-label); position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink); opacity: 0.55; text-align: center; padding: 20px; }
.ph.dark { background: repeating-linear-gradient(45deg, color-mix(in oklab, var(--ink) 90%, transparent) 0 12px, color-mix(in oklab, var(--ink-soft, var(--ink)) 85%, transparent) 12px 24px), var(--ink); }
.ph.dark::after { color: var(--paper); opacity: 0.6; }

.hero { position: relative; min-height: 100vh; padding: 0 var(--page-x); padding-top: 120px; padding-bottom: 60px; display: flex; flex-direction: column; justify-content: flex-end; }
.hero-media { position: absolute; inset: 0; z-index: 0; }
.hero-media .ph { width: 100%; height: 100%; }
.hero-media::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, color-mix(in oklab, var(--paper) 30%, transparent) 0%, transparent 30%, transparent 55%, color-mix(in oklab, var(--ink) 40%, transparent) 100%); }
.hero-inner { position: relative; z-index: 1; color: var(--paper); max-width: 1400px; }
.hero-eyebrow { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; opacity: 0.85; margin-bottom: 32px; display: flex; align-items: center; gap: 14px; }
.hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--highlight); }
.hero-title { font-family: var(--f-display); font-weight: 300; font-size: clamp(52px, 9vw, 148px); line-height: 0.96; letter-spacing: -0.02em; margin-bottom: 24px; }
.hero-title em { font-style: italic; font-family: var(--f-display); color: var(--highlight); font-weight: 300; }
.hero-sub { font-family: var(--f-jp-display); font-size: clamp(14px, 1.4vw, 20px); letter-spacing: 0.2em; opacity: 0.85; max-width: 640px; line-height: 1.9; margin-bottom: 48px; }
.hero-meta { display: flex; gap: 48px; flex-wrap: wrap; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.75; padding-top: 32px; border-top: 1px solid rgba(244,241,234,0.2); }
.hero-meta > div span { display: block; opacity: 0.6; margin-bottom: 4px; }

.section { padding: var(--section-y) var(--page-x); position: relative; }
.section-head { display: grid; grid-template-columns: 1fr 2fr; gap: 60px; margin-bottom: 80px; align-items: end; }
@media (max-width: 860px) { .section-head { grid-template-columns: 1fr; gap: 24px; } }
.section-label { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); }
.section-label .num { display: inline-block; color: var(--accent); margin-right: 12px; }
.section-title { font-family: var(--f-display); font-weight: 300; font-size: clamp(38px, 5.5vw, 80px); line-height: 1.05; letter-spacing: -0.015em; }
.section-title em { font-style: italic; color: var(--accent); }
.section-lede { font-family: var(--f-jp-display); font-size: 15px; line-height: 2; letter-spacing: 0.1em; color: var(--ink-soft, var(--ink)); max-width: 520px; margin-top: 20px; }

.villa-list { display: flex; flex-direction: column; gap: 120px; }
.villa-card { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.villa-card.reverse { direction: rtl; }
.villa-card.reverse > * { direction: ltr; }
@media (max-width: 860px) { .villa-card, .villa-card.reverse { grid-template-columns: 1fr; gap: 32px; direction: ltr; } }
.villa-card .media { position: relative; aspect-ratio: 4/5; }
.villa-card .media .ph { position: absolute; inset: 0; }
.villa-card .media .tag { position: absolute; top: 20px; left: 20px; background: var(--paper); color: var(--ink); font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 6px 12px; z-index: 2; }
.villa-card .info .idx { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 24px; }
.villa-card .info h3 { font-family: var(--f-display); font-size: clamp(42px, 4.5vw, 72px); font-weight: 300; line-height: 1; letter-spacing: -0.02em; margin-bottom: 8px; }
.villa-card .info .jp-name { font-family: var(--f-jp-display); font-size: 14px; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 28px; }
.villa-card .info .desc { font-size: 14px; line-height: 1.9; color: var(--ink-soft, var(--ink)); max-width: 480px; margin-bottom: 32px; }
.villa-card .info .specs { display: flex; gap: 40px; margin-bottom: 40px; padding: 20px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
.villa-card .info .specs > div span { display: block; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.villa-card .info .specs > div strong { font-family: var(--f-display); font-size: 22px; font-weight: 300; letter-spacing: 0.02em; }

.concept { background: var(--paper-warm); }
.concept-body { max-width: 780px; margin: 0 auto; text-align: center; }
.concept-body p { font-family: var(--f-jp-display); font-size: clamp(17px, 1.6vw, 22px); line-height: 2.2; letter-spacing: 0.14em; margin-bottom: 28px; }
.concept-body p.en { font-family: var(--f-display); font-style: italic; font-weight: 300; font-size: clamp(20px, 2vw, 28px); letter-spacing: 0.02em; color: var(--accent); margin-top: 40px; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; padding: 60px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
@media (max-width: 760px) { .stats { grid-template-columns: repeat(2, 1fr); } }
.stat .num { font-family: var(--f-display); font-size: clamp(38px, 4.5vw, 64px); font-weight: 300; line-height: 1; letter-spacing: -0.02em; }
.stat .num .unit { font-size: 0.4em; margin-left: 6px; color: var(--muted); }
.stat .label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 12px; }

.reviews { background: var(--ink); color: var(--paper); }
.reviews .section-label { color: var(--muted-soft); }
.reviews .section-title { color: var(--paper); }
.reviews .section-title em { color: var(--highlight); }
.reviews .section-lede { color: color-mix(in oklab, var(--paper) 80%, transparent); }
.review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
@media (max-width: 860px) { .review-grid { grid-template-columns: 1fr; } }
.review { padding: 40px 0; border-top: 1px solid rgba(244,241,234,0.14); }
.review .rating { font-family: var(--f-display); font-size: 36px; font-weight: 300; margin-bottom: 16px; }
.review .rating em { font-size: 14px; font-style: normal; color: var(--muted-soft); margin-left: 8px; }
.review blockquote { font-family: var(--f-display); font-style: italic; font-size: 20px; line-height: 1.6; margin: 0 0 24px; font-weight: 300; }
.review .who { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-soft); }

.location-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 60px; }
@media (max-width: 860px) { .location-grid { grid-template-columns: 1fr; } }
.map-wrap { position: relative; aspect-ratio: 4/3; background: var(--paper-warm); border: 1px solid var(--line); overflow: hidden; }
.map-svg { width: 100%; height: 100%; display: block; }
.location-list { display: flex; flex-direction: column; }
.location-list .item { padding: 24px 0; border-top: 1px solid var(--line); display: grid; grid-template-columns: auto 1fr auto; gap: 20px; align-items: baseline; }
.location-list .item:last-child { border-bottom: 1px solid var(--line); }
.location-list .item .pin { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); min-width: 32px; }
.location-list .item h4 { font-family: var(--f-display); font-size: 22px; font-weight: 300; margin-bottom: 4px; }
.location-list .item .meta { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
.location-list .item .dist { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--muted); }

.neighborhood { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
@media (max-width: 960px) { .neighborhood { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) { .neighborhood { grid-template-columns: 1fr; } }
.nbh-card .media { aspect-ratio: 3/4; position: relative; margin-bottom: 16px; }
.nbh-card .media .ph { position: absolute; inset: 0; }
.nbh-card .num { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 6px; }
.nbh-card h4 { font-family: var(--f-display); font-size: 22px; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 4px; }
.nbh-card .sub { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.nbh-card .desc { font-size: 13px; line-height: 1.7; color: var(--ink-soft, var(--ink)); }

.faq-list { max-width: 960px; margin: 0 auto; }
.faq-item { border-top: 1px solid var(--line); padding: 28px 0; display: grid; grid-template-columns: 60px 1fr 40px; gap: 24px; align-items: start; cursor: pointer; transition: opacity 0.2s; }
.faq-list .faq-item:last-child { border-bottom: 1px solid var(--line); }
.faq-item .num { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.2em; color: var(--accent); padding-top: 4px; }
.faq-item .q { font-family: var(--f-jp-display); font-size: 18px; letter-spacing: 0.05em; line-height: 1.6; }
.faq-item .a { grid-column: 2; font-size: 14px; line-height: 1.9; color: var(--ink-soft, var(--ink)); opacity: 0.75; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, margin-top 0.3s ease; }
.faq-item.open .a { max-height: 500px; margin-top: 16px; }
.faq-item .toggle { width: 32px; height: 32px; border: 1px solid var(--line-strong); border-radius: 50%; display: flex; align-items: center; justify-content: center; justify-self: end; position: relative; transition: background 0.2s; }
.faq-item .toggle::before, .faq-item .toggle::after { content: ""; position: absolute; background: var(--ink); transition: transform 0.3s; }
.faq-item .toggle::before { width: 12px; height: 1px; }
.faq-item .toggle::after { width: 1px; height: 12px; }
.faq-item.open .toggle::after { transform: rotate(90deg); }

.site-footer { background: var(--ink); color: var(--paper); padding: 100px var(--page-x) 40px; }
.footer-top { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 40px; padding-bottom: 60px; border-bottom: 1px solid rgba(244,241,234,0.14); }
@media (max-width: 860px) { .footer-top { grid-template-columns: 1fr 1fr; } }
.footer-top h5 { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-soft); margin-bottom: 20px; font-weight: 400; }
.footer-brand-mark { font-family: var(--f-display); font-size: 44px; font-weight: 300; line-height: 1; letter-spacing: -0.02em; margin-bottom: 14px; }
.footer-brand-tag { font-family: var(--f-jp-display); font-size: 13px; letter-spacing: 0.22em; opacity: 0.7; margin-bottom: 20px; }
.footer-top ul { list-style: none; padding: 0; margin: 0; }
.footer-top ul li { margin-bottom: 12px; font-size: 13px; opacity: 0.8; }
.footer-top ul li a:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }
.footer-bottom { padding-top: 30px; display: flex; justify-content: space-between; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; flex-wrap: wrap; gap: 12px; }

.sticky-book { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 40; background: var(--ink); color: var(--paper); border-radius: 999px; padding: 10px 10px 10px 28px; display: flex; align-items: center; gap: 24px; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.4); font-size: 12px; letter-spacing: 0.1em; max-width: calc(100vw - 40px); }
.sticky-book .prices { display: flex; gap: 16px; align-items: baseline; }
.sticky-book .prices strong { font-family: var(--f-display); font-weight: 400; font-size: 18px; letter-spacing: 0; }
.sticky-book .btn-book { background: var(--paper); color: var(--ink); }

.tweaks-panel { position: fixed; right: 24px; bottom: 24px; width: 320px; background: var(--paper); color: var(--ink); border: 1px solid var(--line-strong); border-radius: 18px; padding: 22px; box-shadow: 0 30px 80px -20px rgba(0,0,0,0.25); z-index: 60; display: none; font-family: var(--f-body); }
.tweaks-panel.active { display: block; }
.tweaks-panel h4 { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 20px; color: var(--muted); }
.tweak-group { margin-bottom: 18px; }
.tweak-group label { display: block; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-opt { padding: 8px 14px; border: 1px solid var(--line-strong); border-radius: 999px; font-size: 11px; letter-spacing: 0.06em; transition: all 0.15s; }
.tweak-opt.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.tweak-swatches { display: flex; gap: 8px; }
.tweak-sw { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
.tweak-sw:hover { transform: scale(1.08); }
.tweak-sw.active { border-color: var(--ink); }
.tweak-sw.sumi { background: #1a1815; }
.tweak-sw.ai { background: #14202a; }
.tweak-sw.tsuchi { background: #8a5a2c; }
.tweak-sw.koke { background: #4a5a32; }
</style>
<script>
const TWEAK_DEFAULTS = {"theme":"sumi","heading":"serif"};
document.documentElement.dataset.theme = TWEAK_DEFAULTS.theme;
document.documentElement.dataset.heading = TWEAK_DEFAULTS.heading;

// ── data.js (inlined) ──────────────────────────────────────────────
window.VILLAS = [
  {
    id: "nomachi", name: "Nomachi", fullName: "Nomachi Villa", jpName: "野町邸",
    area: "金沢市野町", areaRoman: "Nomachi, Kanazawa",
    tagline: "A modern interpretation of Japanese quietude",
    jpTagline: "和モダンが佇む、大人数のための一棟",

    concept: "築年数を重ねた住宅を、和モダンの感覚で静かに整えた一棟。長い廊下、障子越しのやわらかな光、木と土の気配。金沢に暮らすように過ごす、6名までのための住まい。",

function TweaksPanel() {
  const [active, setActive] = useState(false);
  const [theme, setTheme] = useState(document.documentElement.dataset.theme || "sumi");
  const [heading, setHeading] = useState(document.documentElement.dataset.heading || "serif");
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setActive(true);
      if (e.data?.type === "__deactivate_edit_mode") setActive(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  const apply = (k, v) => {
    document.documentElement.dataset[k] = v;
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };
  return (
    <div className={`tweaks-panel ${active?"active":""}`}>
      <h4>Tweaks</h4>
      <div className="tweak-group">
        <label>Color theme</label>
        <div className="tweak-swatches">
          {["sumi","ai","tsuchi","koke"].map(t => (
            <button key={t} className={`tweak-sw ${t} ${theme===t?"active":""}`} onClick={()=>{setTheme(t); apply("theme", t);}} title={t}/>
          ))}
        </div>
        <div style={{ fontFamily:"var(--f-mono)", fontSize:10, letterSpacing:"0.14em", color:"var(--muted)", marginTop:10 }}>
          {{sumi:"墨 · INK & PAPER", ai:"藍 · AIZUMI", tsuchi:"土 · EARTH", koke:"苔 · MOSS"}[theme]}
        </div>
      </div>
      <div className="tweak-group">
        <label>Display font</label>
        <div className="tweak-options">
          <button className={`tweak-opt ${heading==="serif"?"active":""}`} onClick={()=>{setHeading("serif"); apply("heading","serif");}}>Cormorant</button>
          <button className={`tweak-opt ${heading==="mincho"?"active":""}`} onClick={()=>{setHeading("mincho"); apply("heading","mincho");}}>しっぽり明朝</button>
        </div>
      </div>
      <div className="tweak-group">
        <label>Language preview</label>
        <div className="tweak-options">
          <button className="tweak-opt active">JP</button><button className="tweak-opt">EN</button>
          <button className="tweak-opt">中</button><button className="tweak-opt">FR</button>
        </div>

  );
}
