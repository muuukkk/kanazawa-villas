<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kanazawa Villas — 金沢ヴィラズ</title>
  <meta name="description" content="Three quietly designed houses in Kanazawa. 金沢の野町・白菊町・堀川町に構える、三棟の一棟貸し。"/>

  <!-- Canonical points to /en/ as the default international URL.
       The hreflang tags below tell crawlers about both language versions. -->
  <link rel="canonical" href="https://muuukkk.github.io/kanazawa-villas/en/"/>
  <link rel="alternate" hreflang="en" href="https://muuukkk.github.io/kanazawa-villas/en/"/>
  <link rel="alternate" hreflang="ja" href="https://muuukkk.github.io/kanazawa-villas/ja/"/>
  <link rel="alternate" hreflang="x-default" href="https://muuukkk.github.io/kanazawa-villas/en/"/>

  <!-- OGP -->
  <meta property="og:title" content="Kanazawa Villas — 金沢ヴィラズ"/>
  <meta property="og:description" content="Three quietly designed houses in Kanazawa."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://muuukkk.github.io/kanazawa-villas/"/>
  <meta property="og:image" content="https://muuukkk.github.io/kanazawa-villas/images/nomachi-hero.jpg"/>

  <!-- Fallback redirect for browsers without JS (e.g., some crawlers).
       The JS below runs first and decides EN vs JA based on browser language;
       this <meta refresh> only fires for non-JS clients, defaulting to /en/. -->
  <meta http-equiv="refresh" content="0;url=./en/"/>

  <script>
    // Language detection: ja → /ja/, anything else → /en/
    // Hash fragments (e.g., #villas) are preserved through redirect.
    (function () {
      try {
        var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
        var target = lang.indexOf('ja') === 0 ? './ja/' : './en/';
        var hash = window.location.hash || '';
        window.location.replace(target + hash);
      } catch (e) {
        window.location.replace('./en/');
      }
    })();
  </script>

  <style>
    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
      background: #f4f1ea;
      color: #1a1815;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .holding {
      text-align: center;
      max-width: 480px;
    }
    .holding h1 {
      font-family: "Cormorant Garamond", "Shippori Mincho", serif;
      font-weight: 300;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.01em;
      margin: 0 0 16px;
    }
    .holding p {
      font-size: 14px;
      line-height: 1.8;
      color: #7a756c;
      margin: 0 0 28px;
    }
    .holding .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .holding a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      background: #1a1815;
      color: #f4f1ea;
      text-decoration: none;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.14em;
      transition: opacity 0.2s;
    }
    .holding a:hover { opacity: 0.85; }
    .holding a.ghost {
      background: transparent;
      color: #1a1815;
      border: 1px solid #1a1815;
    }
  </style>
</head>
<body>

<!-- Visible only if both JS and meta-refresh fail (extremely rare).
     Provides manual links so the user is never stranded. -->
<div class="holding">
  <h1>Kanazawa Villas — 金沢ヴィラズ</h1>
  <p>
    Three quietly designed houses in Kanazawa.<br/>
    金沢に三棟、一棟貸しの宿。
  </p>
  <div class="links">
    <a href="./en/">English →</a>
    <a href="./ja/" class="ghost">日本語 →</a>
  </div>
</div>

<!-- Static fallback links (always present in HTML) for crawlers.
     This guarantees the site map is fully discoverable from the root URL. -->
<div style="position:absolute; left:-9999px; top:auto; width:1px; height:1px; overflow:hidden;" aria-label="Site links">
  <ul>
    <li><a href="./en/" hreflang="en">English version</a></li>
    <li><a href="./ja/" hreflang="ja">日本語版</a></li>
    <li><a href="./contact.html">Contact</a></li>
    <li><a href="./legal/tokushoho.html">特定商取引法に基づく表記</a></li>
    <li><a href="./legal/privacy.html">Privacy Policy</a></li>
    <li><a href="./legal/terms.html">Accommodation Agreement</a></li>
    <li><a href="./legal/house-rules.html">House Rules</a></li>
    <li><a href="https://beds24.com/booking2.php?propid=261406" rel="noopener">Book Nomachi Villa directly</a></li>
    <li><a href="https://airbnb.jp/h/shiragiku-villa" rel="noopener">Book Shiragiku Villa on Airbnb</a></li>
  </ul>
</div>

</body>
</html>
